<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Wallet Workshop Studio</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .bg-grid { background-image: radial-gradient(#e2e8f0 1px, transparent 1px); background-size: 20px 20px; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        [v-cloak] { display: none; }
    </style>
</head>

<body class="bg-slate-50 text-slate-900 font-sans antialiased">
    <div id="app" v-cloak class="flex h-screen overflow-hidden">
        
        <aside class="w-72 bg-white border-r border-slate-200 flex flex-col shrink-0">
            <div class="p-6 border-b border-slate-100">
                <div class="flex items-center gap-3 mb-2">
                    <div class="bg-indigo-600 text-white p-2 rounded-lg shadow-indigo-200 shadow-lg">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V8a2 2 0 00-2-2h-5m-4 0V5a2 2 0 114 0v1m-4 0a2 2 0 104 0m-5 8a2 2 0 100-4 2 2 0 000 4zm0 0c1.306 0 2.417.835 2.83 2M9 14a3.001 3.001 0 00-2.83 2M15 11h3m-3 4h2" /></svg>
                    </div>
                    <h1 class="font-black text-slate-800 tracking-tight text-lg">Wallet Studio</h1>
                </div>
                <div class="flex items-center gap-2">
                    <div class="flex-1 h-1.5 bg-slate-100 rounded-full overflow-hidden">
                        <div class="h-full bg-indigo-600 transition-all duration-500" :style="{ width: completeness + '%' }"></div>
                    </div>
                    <span class="text-[10px] font-bold text-slate-400">{{ completeness }}%</span>
                </div>
            </div>

            <nav class="flex-1 overflow-y-auto p-4 space-y-1 custom-scrollbar">
                <button v-for="s in steps" :key="s.id" @click="gotoStep(s.id)"
                    :class="[
                        'w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium transition-all group',
                        currentStep === s.id ? 'bg-indigo-50 text-indigo-700 shadow-sm' : 'text-slate-500 hover:bg-slate-50'
                    ]">
                    <span :class="[
                        'w-6 h-6 rounded-lg flex items-center justify-center text-[10px] border transition-colors font-bold',
                        currentStep === s.id ? 'bg-indigo-600 border-indigo-600 text-white' : 'bg-white border-slate-200 text-slate-400 group-hover:border-slate-300'
                    ]">
                        {{ s.id }}
                    </span>
                    {{ s.labelShort }}
                    <span v-if="isStepValid(s.id)" class="ml-auto text-emerald-500">
                        <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd" /></path></svg>
                    </span>
                </button>
            </nav>

            <div class="p-4 border-t border-slate-100 space-y-2">
                <button @click="openImportModal" class="w-full text-left px-3 py-2 text-xs font-bold text-slate-500 hover:text-indigo-600 transition-colors flex items-center gap-2">
                    <span>📥</span> Importer JSON / Hash
                </button>
                <button @click="resetAll" class="w-full text-left px-3 py-2 text-xs font-bold text-rose-500 hover:bg-rose-50 rounded-lg transition-colors flex items-center gap-2">
                    <span>♻</span> Réinitialiser l'atelier
                </button>
            </div>
        </aside>

        <main class="flex-1 flex flex-col min-w-0 bg-white">
            
            <header class="h-16 border-b border-slate-100 flex items-center justify-between px-8 bg-white/80 backdrop-blur-md z-10 shrink-0">
                <div class="flex items-center gap-4">
                    <h2 class="font-bold text-slate-800">{{ stepLabel }}</h2>
                    <span class="px-2 py-0.5 rounded-md bg-slate-100 text-[10px] font-bold text-slate-500 uppercase tracking-tighter italic">
                        {{ ui.viewMode === 'atelier' ? 'Mode Business' : 'Mode Expert' }}
                    </span>
                </div>
                
                <div class="flex items-center gap-3">
                    <button @click="copyShareLink" class="px-4 py-2 text-xs font-bold bg-emerald-50 text-emerald-700 rounded-lg hover:bg-emerald-100 transition-colors">
                        Partager le lien
                    </button>
                    <div class="h-4 w-px bg-slate-200"></div>
                    <div class="flex bg-slate-100 p-1 rounded-lg">
                        <button @click="exportJson" class="px-3 py-1.5 text-[11px] font-bold rounded-md hover:bg-white hover:shadow-sm transition-all">JSON</button>
                        <button @click="exportHtml" class="px-3 py-1.5 text-[11px] font-bold rounded-md hover:bg-white hover:shadow-sm transition-all text-blue-600">PDF / Print</button>
                        <button @click="exportDevPackZip" class="px-3 py-1.5 text-[11px] font-bold rounded-md bg-indigo-600 text-white shadow-sm">Dev Pack .zip</button>
                    </div>
                </div>
            </header>

            <div class="flex-1 flex overflow-hidden">
                
                <div class="flex-1 overflow-y-auto p-8 bg-grid custom-scrollbar">
                    <div class="max-w-3xl mx-auto">
                        
                        <div v-if="topWarnings.length && currentStep === 8" class="mb-6 p-4 bg-amber-50 border-l-4 border-amber-400 rounded-r-xl">
                            <h4 class="text-amber-800 font-bold text-sm mb-1">Éléments à finaliser</h4>
                            <ul class="text-[11px] text-amber-700 space-y-1">
                                <li v-for="w in topWarnings" :key="w">• {{ w }}</li>
                            </ul>
                        </div>

                        <div class="bg-white rounded-2xl p-8 border border-slate-200 shadow-sm transition-all">
                            <div v-if="currentStep === 1" class="space-y-6">
                                <div class="grid grid-cols-2 gap-6">
                                    <div class="space-y-1">
                                        <label class="text-[11px] font-black uppercase text-slate-400 tracking-wider">Nom du Projet</label>
                                        <input v-model="project.name" type="text" class="w-full p-3 rounded-xl border border-slate-200 bg-slate-50 focus:bg-white focus:ring-4 focus:ring-indigo-500/10 outline-none transition-all" placeholder="Ex: Suivi Colis Premium">
                                    </div>
                                    <div class="space-y-1">
                                        <label class="text-[11px] font-black uppercase text-slate-400 tracking-wider">Marque</label>
                                        <input v-model="project.brand" type="text" class="w-full p-3 rounded-xl border border-slate-200 bg-slate-50 focus:bg-white focus:ring-4 focus:ring-indigo-500/10 outline-none transition-all" placeholder="Ex: Colissimo">
                                    </div>
                                </div>
                                <div class="space-y-1">
                                    <label class="text-[11px] font-black uppercase text-slate-400 tracking-wider">Objectif Business</label>
                                    <textarea v-model="project.description" rows="3" class="w-full p-3 rounded-xl border border-slate-200 bg-slate-50 focus:bg-white focus:ring-4 focus:ring-indigo-500/10 outline-none transition-all" placeholder="Décrivez le besoin..."></textarea>
                                </div>
                            </div>
                            </div>

                        <div class="mt-8 flex items-center justify-between border-t border-slate-100 pt-6">
                            <button @click="prevStep" v-if="currentStep > 1" class="px-6 py-2.5 text-sm font-bold text-slate-500 hover:text-slate-800 transition-colors">
                                ← Étape précédente
                            </button>
                            <div v-else></div>
                            <button @click="nextStep" v-if="currentStep < steps.length" class="px-8 py-3 bg-slate-900 text-white rounded-xl text-sm font-bold shadow-lg shadow-slate-200 hover:bg-indigo-600 hover:shadow-indigo-100 transition-all">
                                Continuer →
                            </button>
                        </div>
                    </div>
                </div>

                <div :class="[ui.showPreview ? 'w-[450px]' : 'w-0']" class="bg-slate-900 border-l border-slate-800 transition-all duration-300 relative flex flex-col">
                    <button @click="ui.showPreview = !ui.showPreview" 
                        class="absolute -left-10 top-1/2 -translate-y-1/2 bg-slate-900 border border-slate-700 text-white p-2 rounded-l-xl shadow-xl">
                        <span v-if="!ui.showPreview">📂</span>
                        <span v-else>✕</span>
                    </button>

                    <div v-if="ui.showPreview" class="flex-1 flex flex-col min-w-[450px] overflow-hidden">
                        <div class="p-4 border-b border-slate-800 flex items-center justify-between">
                            <h3 class="text-[10px] font-black uppercase text-slate-500 tracking-widest">Live Spec Preview</h3>
                            <button @click="ui.viewMode = ui.viewMode === 'atelier' ? 'tech' : 'atelier'" class="text-[10px] text-indigo-400 font-bold hover:underline">
                                {{ ui.viewMode === 'atelier' ? 'Activer Mode Expert' : 'Revenir Mode Business' }}
                            </button>
                        </div>
                        
                        <div class="flex bg-slate-800/50 p-1 mx-4 mt-4 rounded-lg">
                            <button v-for="t in tabs" :key="t.id" @click="activeTab = t.id"
                                :class="[activeTab === t.id ? 'bg-slate-700 text-white shadow-sm' : 'text-slate-500']"
                                class="flex-1 py-1.5 text-[10px] font-bold rounded-md uppercase tracking-tighter">
                                {{ t.label }}
                            </button>
                        </div>

                        <div class="flex-1 p-6 overflow-y-auto custom-scrollbar">
                             <pre class="text-indigo-300 font-mono text-[11px] leading-relaxed">{{ activeTabContent }}</pre>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    </body>
</html>
